<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RiskScan Resultado</title>

<style>

body{
background:#06090d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#0b1114;
padding:40px;
border-radius:12px;
text-align:center;
max-width:700px;
width:90%;
border:1px solid rgba(0,255,149,.1);
}

.score{
font-size:4rem;
color:#00ff95;
font-weight:bold;
margin:20px 0;
}

#nivel{
font-size:1.3rem;
margin:15px 0;
}

#mensaje{
margin-top:20px;
color:#cccccc;
line-height:1.6;
}
.pdf-btn{
background:#00ff95;
color:#000;
border:none;
padding:12px 24px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:25px;
}

.pdf-btn:hover{
opacity:.9;
}
@media print {

body{
background:white !important;
color:black !important;
display:block;
padding:0;
margin:0;
}

.card{
background:white !important;
color:black !important;
border:none !important;
box-shadow:none !important;
width:100% !important;
max-width:100% !important;
padding:40px;
}

.score{
color:#0a9d58 !important;
}

h1,h2,h3{
color:#0a9d58 !important;
}

#pdfBtn{
display:none;
}

}
</style>

</head>

<body>

<div class="card">

<h1>RiskScan Score</h1>
<p id="fecha" style="color:#99bfb0;margin-top:-10px;">
Evaluación realizada: --
</p>

<div class="score" id="score">
0
</div>

<p id="nivel">
Calculando...
</p>

<p id="mensaje">
Analizando resultados...
</p>
<h3 style="margin-top:30px;color:#00ff95;">
Resultados por Dominio
</h3>

<div id="domains" style="
margin-top:15px;
text-align:left;
line-height:1.8;
">
</div>

<h3 style="margin-top:30px;color:#00ff95;">
Hallazgo Principal
</h3>

<p id="hallazgo" style="
max-width:700px;
margin:0 auto;
line-height:1.6;
padding:0 20px;
">
Calculando hallazgo...
</p
<h3 style="margin-top:30px;color:#00ff95;">
Recomendaciones Prioritarias
</h3>

<div id="recomendaciones" style="
text-align:left;
margin-top:15px;
line-height:1.8;
">
</div>

<button id="pdfBtn" class="pdf-btn">
📄 Descargar Informe
</button>

</div>

<script>

const answers =
JSON.parse(
localStorage.getItem("riskscan_answers")
) || [];
function calculateDomain(start,end){

const slice =
answers.slice(start,end);

const total =
slice.reduce((a,b)=>a+b,0);

const max =
slice.length * 4;

return max > 0
? Math.round((total/max)*100)
: 0;

}

const activos =
calculateDomain(0,5);

const ciber =
calculateDomain(5,10);

const continuidad =
calculateDomain(10,15);

const recuperacion =
calculateDomain(15,20);

const humana =
calculateDomain(20,25);

const totalPoints =
answers.reduce((a,b)=>a+b,0);

const maxPoints =
answers.length * 4;

const score =
maxPoints > 0
? Math.round((totalPoints/maxPoints)*100)
: 0;

document.getElementById("score").textContent =
score;
const hoy = new Date();

document.getElementById("fecha").textContent =
`Evaluación realizada: ${hoy.toLocaleDateString("es-CL")}`;

let nivel = "";
let mensaje = "";

if(score >= 85){
nivel = "🟢 Resiliente";
mensaje = "La organización presenta una alta capacidad de recuperación y continuidad operacional.";
}
else if(score >= 70){
nivel = "🟢 Maduro";
mensaje = "La organización cuenta con controles adecuados, aunque existen oportunidades de mejora.";
}
else if(score >= 50){
nivel = "🟡 Intermedio";
mensaje = "Existen riesgos que podrían afectar la continuidad operacional ante un incidente.";
}
else if(score >= 30){
nivel = "🟠 Vulnerable";
mensaje = "La organización presenta debilidades importantes en recuperación y resiliencia.";
}
else{
nivel = "🔴 Crítico";
mensaje = "Se recomienda abordar de forma prioritaria los riesgos identificados.";
}

document.getElementById("nivel").textContent =
"Nivel: " + nivel;

document.getElementById("mensaje").textContent =
mensaje;
const domainsDiv =
document.getElementById("domains");

domainsDiv.innerHTML = `
<p>Activos Críticos .......... ${activos}%</p>
<p>Ciberseguridad ............ ${ciber}%</p>
<p>Continuidad Operacional ... ${continuidad}%</p>
<p>Respaldo y Recuperación ... ${recuperacion}%</p>
<p>Dependencia Humana ........ ${humana}%</p>
`;

const lowest =
Math.min(
activos,
ciber,
continuidad,
recuperacion,
humana
);

let hallazgo = "";

if(lowest === activos){

hallazgo =
"La principal debilidad identificada corresponde a la gestión de activos críticos y clasificación de información.";

}
else if(lowest === ciber){

hallazgo =
"La principal debilidad identificada corresponde a controles de ciberseguridad y protección tecnológica.";

}
else if(lowest === continuidad){

hallazgo =
"La principal debilidad identificada corresponde a continuidad operacional y capacidad de respuesta ante incidentes.";

}
else if(lowest === recuperacion){

hallazgo =
"La principal debilidad identificada corresponde a respaldos y recuperación de servicios críticos.";

}
else{

hallazgo =
"La principal debilidad identificada corresponde a dependencia de personal clave y falta de documentación.";

}

document.getElementById("hallazgo").textContent =
hallazgo;
let recomendaciones = "";

if(lowest === activos){

recomendaciones = `
<ul>
<li>Crear inventario formal de activos.</li>
<li>Clasificar información crítica.</li>
<li>Revisar activos periódicamente.</li>
</ul>
`;

}
else if(lowest === ciber){

recomendaciones = `
<ul>
<li>Implementar MFA.</li>
<li>Aplicar actualizaciones periódicas.</li>
<li>Revisar privilegios de acceso.</li>
</ul>
`;

}
else if(lowest === continuidad){

recomendaciones = `
<ul>
<li>Documentar procedimientos de continuidad.</li>
<li>Definir responsables operacionales.</li>
<li>Realizar simulacros periódicos.</li>
</ul>
`;

}
else if(lowest === recuperacion){

recomendaciones = `
<ul>
<li>Validar respaldos regularmente.</li>
<li>Realizar pruebas de restauración.</li>
<li>Mantener copias fuera del sitio.</li>
</ul>
`;

}
else{

recomendaciones = `
<ul>
<li>Documentar procedimientos críticos.</li>
<li>Capacitar personal alternativo.</li>
<li>Reducir dependencia de personas clave.</li>
</ul>
`;

}

document.getElementById("recomendaciones").innerHTML =
recomendaciones;

document.getElementById("pdfBtn")
.addEventListener("click",()=>{

window.print();

});

</script>

</body>
</html>
