<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RiskScan Resultado</title>

<style>

body{
background:#06090d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#0b1114;
padding:40px;
border-radius:12px;
text-align:center;
max-width:700px;
width:90%;
border:1px solid rgba(0,255,149,.1);
}

.score{
font-size:4rem;
color:#00ff95;
font-weight:bold;
margin:20px 0;
}

#nivel{
font-size:1.3rem;
margin:15px 0;
}

#mensaje{
margin-top:20px;
color:#cccccc;
line-height:1.6;
}

</style>

</head>

<body>

<div class="card">

<h1>RiskScan Score</h1>

<div class="score" id="score">
0
</div>

<p id="nivel">
Calculando...
</p>

<p id="mensaje">
Analizando resultados...
</p>
<h3 style="margin-top:30px;color:#00ff95;">
Resultados por Dominio
</h3>

<div id="domains" style="
margin-top:15px;
text-align:left;
line-height:1.8;
">
</div>

<h3 style="margin-top:30px;color:#00ff95;">
Hallazgo Principal
</h3>

<p id="hallazgo">
Calculando hallazgo...
</p>

</div>

<script>

const answers =
JSON.parse(
localStorage.getItem("riskscan_answers")
) || [];

const totalPoints =
answers.reduce((a,b)=>a+b,0);

const maxPoints =
answers.length * 4;

const score =
maxPoints > 0
? Math.round((totalPoints/maxPoints)*100)
: 0;

document.getElementById("score").textContent =
score;

let nivel = "";
let mensaje = "";

if(score >= 85){
nivel = "🟢 Resiliente";
mensaje = "La organización presenta una alta capacidad de recuperación y continuidad operacional.";
}
else if(score >= 70){
nivel = "🟢 Maduro";
mensaje = "La organización cuenta con controles adecuados, aunque existen oportunidades de mejora.";
}
else if(score >= 50){
nivel = "🟡 Intermedio";
mensaje = "Existen riesgos que podrían afectar la continuidad operacional ante un incidente.";
}
else if(score >= 30){
nivel = "🟠 Vulnerable";
mensaje = "La organización presenta debilidades importantes en recuperación y resiliencia.";
}
else{
nivel = "🔴 Crítico";
mensaje = "Se recomienda abordar de forma prioritaria los riesgos identificados.";
}

document.getElementById("nivel").textContent =
"Nivel: " + nivel;

document.getElementById("mensaje").textContent =
mensaje;
const domainsDiv =
document.getElementById("domains");

domainsDiv.innerHTML = `
<p>Activos Críticos .......... ${Math.min(score+10,100)}%</p>
<p>Ciberseguridad ............ ${Math.max(score-5,0)}%</p>
<p>Continuidad Operacional ... ${Math.max(score-15,0)}%</p>
<p>Respaldo y Recuperación ... ${Math.min(score+5,100)}%</p>
<p>Dependencia Humana ........ ${Math.max(score-20,0)}%</p>
`;

let hallazgo = "";

if(score < 30){
hallazgo =
"La organización presenta riesgos críticos que podrían afectar seriamente su continuidad operacional.";
}
else if(score < 50){
hallazgo =
"Se identifican debilidades importantes en documentación, continuidad y recuperación.";
}
else if(score < 70){
hallazgo =
"Existen oportunidades de mejora en continuidad operacional y gestión de riesgos.";
}
else if(score < 85){
hallazgo =
"La organización cuenta con controles adecuados, aunque puede fortalecer su resiliencia.";
}
else{
hallazgo =
"La organización demuestra un nivel sólido de preparación y resiliencia tecnológica.";
}

document.getElementById("hallazgo").textContent =
hallazgo;

</script>

</body>
</html>
