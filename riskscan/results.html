<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RiskScan Resultado</title>

<style>

body{
background:#06090d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#0b1114;
padding:40px;
border-radius:12px;
text-align:center;
max-width:700px;
width:90%;
}

.score{
font-size:4rem;
color:#00ff95;
font-weight:bold;
}

</style>

</head>

<body>
<script>

const answers =
JSON.parse(
localStorage.getItem("riskscan_answers")
) || [];

const totalPoints =
answers.reduce((a,b)=>a+b,0);

const maxPoints =
answers.length * 4;

const score =
Math.round(
(totalPoints/maxPoints)*100
);

document.getElementById("score").textContent =
score;

</script>
<div class="card">

<h1>RiskScan Score</h1>

<div class="score" id="score">
0
</div>

<p>
Nivel: Intermedio
</p>

<p>
La organización presenta oportunidades de mejora
en continuidad operacional y recuperación.
</p>

</div>

</body>
</html>
