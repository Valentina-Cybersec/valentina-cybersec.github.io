    <meta charset="UTF-8">

    <title>RiskScan Resultado</title>

    <style>
        body{
            background:#06090d;
            color:white;
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;

            margin:0;

        .card{
            background:#0b1114;

        }

        #mensaje{
            margin-top:20px;
            color:#cccccc;
            line-height:1.6;
        }

        .pdf-btn{
            background:#00ff95;
            color:#000;
            border:none;
            padding:12px 24px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            margin-top:25px;
        }

        .pdf-btn:hover{
            opacity:.9;

        @media print {
            body{

                color:black !important;
                display:block;
                padding:0;
                margin:0;
            }

            .card{
                background:white !important;
                color:black !important;

            }

            }
