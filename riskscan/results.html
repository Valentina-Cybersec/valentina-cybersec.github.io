<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W9PKJ5XNJF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-W9PKJ5XNJF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RiskScan Resultado</title>

    <style>
        body{
            background:#06090d;
            color:white;
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            padding:40px 0;
            margin:0;
        }

        .card{
            background:#0b1114;
            padding:40px;
            border-radius:12px;
            text-align:center;
            max-width:700px;
            width:90%;
            border:1px solid rgba(0,255,149,.1);
        }

        .score{
            font-size:4rem;
            color:#00ff95;
            font-weight:bold;
            margin:20px 0;
        }

        #nivel{
            font-size:1.3rem;
            margin:15px 0;
        }

        #mensaje{
            margin-top:20px;
            color:#cccccc;
            line-height:1.6;
        }

        .pdf-btn{
            background:#00ff95;
            color:#000;
            border:none;
            padding:12px 24px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            margin-top:25px;
        }

        .pdf-btn:hover{
            opacity:.9;
        }

        /* ESTILOS PARA CUANDO SE IMPRIME EL PDF */
        @media print {
            body{
                background:white !important;
                color:black !important;
                display:block;
                padding:0;
                margin:0;
            }

            .card{
                background:white !important;
                color:black !important;
                border:none !important;
                box-shadow:none !important;
                width:auto !important;
                max-width:none !important;
                padding:20px !important;
                margin:0 !important;
            }

            .score{
                color:#0a9d58 !important;
            }

            h1,h2,h3{
                color:#0a9d58 !important;
            }

            /* Esto oculta el botón de PDF y la caja de WhatsApp en la impresión */
            #pdfBtn, .caja-whatsapp {
                display:none !important;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Resultado de su Evaluación</h1>
        <div id="resultado" class="score">0%</div>
        <div id="nivel">Calculando...</div>
        <p id="mensaje">Analizando sus respuestas...</p>
        
        <div id="recomendaciones" style="text-align: left; margin-top: 20px;">
            <!-- Aquí JavaScript inyecta la lista <ul> de recomendaciones -->
        </div>

        <button id="pdfBtn" class="pdf-btn">Descargar Reporte PDF</button>
    </div>

    <script>
        // ... (Tu lógica previa para calcular las variables 'lowest', 'ciber', etc. debe ir aquí) ...

        // Ejemplo de marcador de posición para evitar errores si pruebas el código aislado:
        let lowest = "ciber"; 
        let ciber = "ciber";
        let recomendaciones = "";

        if(lowest === "activos"){
            recomendaciones = `
            <ul>
            <li>Crear inventario formal de activos.</li>
            <li>Clasificar información crítica.</li>
            <li>Revisar activos periódicamente.</li>
            </ul>
            `;
        }
        else if(lowest === ciber){
            recomendaciones = `
            <ul>
            <li>Implementar MFA.</li>
            <li>Aplicar actualizaciones periódicas.</li>
            <li>Revisar privilegios de acceso.</li>
            </ul>
            `;
        }
        else if(lowest === "continuidad"){
            recomendaciones = `
            <ul>
            <li>Documentar procedimientos de continuidad.</li>
            <li>Definir responsables operacionales.</li>
            <li>Realizar simulacros periódicos.</li>
            </ul>
            `;
        }
        else if(lowest === "recuperacion"){
            recomendaciones = `
            <ul>
            <li>Validar respaldos regularmente.</li>
            <li>Realizar pruebas de restauración.</li>
            <li>Mantener copias fuera del sitio.</li>
            </ul>
            `;
        }
        else{
            recomendaciones = `
            <ul>
            <li>Documentar procedimientos críticos.</li>
            <li>Capacitar personal alternativo.</li>
            <li>Reducir dependencia de personas clave.</li>
            </ul>
            `;
        }

        // 1. Muestra las recomendaciones en pantalla
        document.getElementById("recomendaciones").innerHTML = recomendaciones;

        // 2. Inserta el botón de WhatsApp con tu número real justo abajo
        const cajaContactoHTML = `
        <div class="caja-whatsapp" style="margin-top: 40px; padding: 30px; background: #0b1114; border-radius: 12px; border: 1px dashed #00ff95; text-align: center;">
          <h3 style="color: #00ff95; margin-bottom: 15px; font-size: 1.5rem; font-family: Arial,sans-serif;">¿Quieres ayuda para implementar estas recomendaciones?</h3>
          <p style="color: white; margin-bottom: 25px; font-weight: 300; font-size: 1.1rem; font-family: Arial,sans-serif;">
            No dejes la seguridad de tu empresa al azar. Agenda una revisión gratuita de 15 minutos para priorizar tu plan de acción.
          </p>
          <a href="https://wa.me/56968672169?text=Hola%20Valentina,%20hice%20el%20test%20en%20RiskScan%20y%20me%20gustar%C3%ADa%20revisar%20mi%20plan%20de%20acci%C3%B3n" 
             target="_blank" 
             style="display: inline-block; padding: 15px 30px; background: #25D366; color: #fff; font-weight: 700; text-decoration: none; border-radius: 8px; font-size: 1rem; letter-spacing: 0.5px; font-family: Arial,sans-serif; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);">
             💬 Hablar con un Especialista por WhatsApp
          </a>
        </div>
        `;

        document.getElementById("recomendaciones").insertAdjacentHTML('afterend', cajaContactoHTML);

        // 3. Botón para imprimir PDF
        document.getElementById("pdfBtn").addEventListener("click",()=>{
            window.print();
        });
    </script>
</body>
</html>
